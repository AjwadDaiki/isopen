<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="8" fill="#0d0d14"/>

  <!-- Outer ring — represents "open circle / O" -->
  <circle cx="16" cy="16" r="10.5" fill="none" stroke="#22c55e" stroke-width="2"/>

  <!-- Checkmark — represents "yes, it's open" -->
  <path
    d="M11 16.5 L14.5 20 L21 12.5"
    stroke="#22c55e"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Small inner pulse dot (live indicator) -->
  <circle cx="22.5" cy="9.5" r="3" fill="#0d0d14"/>
  <circle cx="22.5" cy="9.5" r="2.2" fill="#22c55e"/>
</svg>
